<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- favicon -->
    <link
      rel="icon"
      href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'>
  <defs>
    <linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' stop-color='%23A855F7'/>
      <stop offset='50%' stop-color='%23EC4899'/>
      <stop offset='100%' stop-color='%23F97316'/>
    </linearGradient>
  </defs>
  <circle cx='32' cy='32' r='30' fill='url(%23grad)'/>
  <text x='32' y='42' font-size='28' text-anchor='middle' fill='white' font-family='Arial, sans-serif'>$</text>
</svg>"
    />
    <!-- title -->
    <title>Balance-tracker-application</title>
    <!-- tailwind css -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- css -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body
    class="bg-linear-to-br from-purple-400 via-pink-400 to-orange-300 min-h-screen flex items-center justify-center font-sans"
  >
    <div
      class="w-full max-w-2xl backdrop-blur-lg bg-white/30 rounded-3xl shadow-2xl p-10 border border-white/20"
    >
      <!-- Title -->
      <h1 class="text-5xl font-extrabold text-white text-center drop-shadow-lg"
        >Balance Tracker</h1
      >

      <!-- Balance Display -->
      <div
        class="flex flex-col items-center mt-8 bg-white/20 rounded-xl p-6 shadow-lg w-full"
      >
        <p class="text-sm text-white/80 uppercase tracking-wide"
          >Your Balance</p
        >
        <h2 class="text-4xl font-bold text-white mt-2"
          >$<span id="balanceAmount">0.00</span></h2
        >
      </div>

      <!-- Income & Expenses -->
      <div
        class="flex justify-between mt-8 bg-white/20 p-6 rounded-xl shadow-lg"
      >
        <div class="flex flex-col items-center text-green-500">
          <p class="text-xs uppercase tracking-wider">Income</p>
          <h3 class="text-2xl font-semibold"
            >$<span id="incomeTotal">0.00</span></h3
          >
        </div>
        <div class="flex flex-col items-center text-red-500">
          <p class="text-xs uppercase tracking-wider">Expenses</p>
          <h3 class="text-2xl font-semibold"
            >$<span id="expensesTotal">0.00</span></h3
          >
        </div>
      </div>

      <!-- Inputs -->
      <div class="flex flex-col gap-4 mt-8">
        <input
          id="transactionDetails"
          type="text"
          required
          placeholder="Transaction Details"
          class="p-4 rounded-xl border border-white/30 bg-white/20 placeholder-white/70 text-white focus:ring-2 focus:ring-purple-300 focus:outline-none transition duration-300"
        />
        <input
          id="transactionAmount"
          type="number"
          required
          placeholder="0.00"
          class="p-4 rounded-xl border border-white/30 bg-white/20 placeholder-white/70 text-white focus:ring-2 focus:ring-purple-300 focus:outline-none transition duration-300"
        />
      </div>

      <!-- Buttons -->
      <div class="flex justify-center gap-6 mt-6">
        <button
          id="addBtn"
          type="button"
          class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-2xl shadow-xl transform hover:-translate-y-1 transition-all duration-300"
        >
          Add Transaction
        </button>
        <button
          id="subtractBtn"
          type="button"
          class="bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-6 rounded-2xl shadow-xl transform hover:-translate-y-1 transition-all duration-300"
        >
          Subtract Transaction
        </button>
      </div>

      <!-- Transaction Boxes -->
      <div id="transactionContainer" class="flex flex-col gap-4 mt-8">
        <!-- Income Box Template -->
        <!-- <div
          id="incomeBoxTemplate"
          class="bg-green-100/50 backdrop-blur-md rounded-xl p-4 flex justify-between shadow-inner text-green-800"
        >
          <p class="font-semibold">Income Example</p>
          <p class="font-semibold">$100</p>
        </div> -->
        <!-- Expense Box Template -->
        <!--  <div
          id="expensesBoxTemplate"
          class="bg-red-100/50 backdrop-blur-md rounded-xl p-4 flex justify-between shadow-inner text-red-800"
        >
          <p class="font-semibold">Expense Example</p>
          <p class="font-semibold">$50</p>
        </div> -->
      </div>
    </div>
    <!-- js link -->
    <script src="./js/script.js"></script>
  </body>
</html>
